<!DOCTYPE html>
<html>
<head><title>Loop Icon Comparison</title>
<style>
body { background: #c0c0c0; font-family: 'MS Sans Serif', sans-serif; padding: 40px; display:flex; gap:40px; flex-direction:column;}
.row { display:flex; gap:30px; align-items:center; }
.btn { width: 48px; height: 40px; background: #c0c0c0; border: none; cursor: pointer;
  box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff, inset -2px -2px grey, inset 2px 2px #dfdfdf;
  display: flex; align-items: center; justify-content: center; }
.btn-lg { width: 80px; height: 64px; }
.label { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
.group { display:flex; flex-direction:column; align-items:center; gap:6px; }
h2 { margin: 0 0 10px 0; }
</style>
</head>
<body>
<h2>Actual Size (16x16)</h2>
<div class="row">
  <div class="group">
    <div class="label">列表循环</div>
    <button class="btn">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" style="shape-rendering:crispEdges"><rect x="1" y="1" width="9" height="2"/><polygon points="10,0 14,2 10,4"/><rect x="12" y="4" width="2" height="3"/><rect x="6" y="13" width="9" height="2"/><polygon points="6,12 6,16 2,14"/><rect x="2" y="9" width="2" height="3"/></svg>
    </button>
  </div>
  <div class="group">
    <div class="label">单曲循环</div>
    <button class="btn">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor" style="shape-rendering:crispEdges"><rect x="1" y="1" width="9" height="2"/><polygon points="10,0 14,2 10,4"/><rect x="12" y="4" width="2" height="3"/><rect x="6" y="13" width="9" height="2"/><polygon points="6,12 6,16 2,14"/><rect x="2" y="9" width="2" height="3"/><rect x="6" y="5" width="2" height="1"/><rect x="7" y="5" width="2" height="7"/><rect x="5" y="11" width="6" height="1"/></svg>
    </button>
  </div>
</div>

<h2>Enlarged (3x for detail)</h2>
<div class="row">
  <div class="group">
    <div class="label">列表循环 (空心)</div>
    <button class="btn btn-lg">
      <svg viewBox="0 0 16 16" width="48" height="48" fill="currentColor" style="shape-rendering:crispEdges"><rect x="1" y="1" width="9" height="2"/><polygon points="10,0 14,2 10,4"/><rect x="12" y="4" width="2" height="3"/><rect x="6" y="13" width="9" height="2"/><polygon points="6,12 6,16 2,14"/><rect x="2" y="9" width="2" height="3"/></svg>
    </button>
  </div>
  <div class="group">
    <div class="label">单曲循环 (带 "1")</div>
    <button class="btn btn-lg">
      <svg viewBox="0 0 16 16" width="48" height="48" fill="currentColor" style="shape-rendering:crispEdges"><rect x="1" y="1" width="9" height="2"/><polygon points="10,0 14,2 10,4"/><rect x="12" y="4" width="2" height="3"/><rect x="6" y="13" width="9" height="2"/><polygon points="6,12 6,16 2,14"/><rect x="2" y="9" width="2" height="3"/><rect x="6" y="5" width="2" height="1"/><rect x="7" y="5" width="2" height="7"/><rect x="5" y="11" width="6" height="1"/></svg>
    </button>
  </div>
</div>
</body>
</html>
